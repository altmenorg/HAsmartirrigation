[tool:pytest]
testpaths =
    tests
    custom_components/smart_irrigation/tests/test_helpers.py
    custom_components/smart_irrigation/tests/test_performance.py
    custom_components/smart_irrigation/tests/test_diagnostics.py
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --ignore-glob=**/test_*.py.disabled
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
